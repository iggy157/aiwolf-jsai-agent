# Multi-turn モード用の子設定ファイル.
# LLMプロバイダ・モデル・プロンプト定義を含む.
# メインconfigの mode が multi_turn のときに読み込まれる.

llm:
  type: anthropic
  # llm 直下でも model / temperature / pricing_mode / base_url を書けば
  # 下のプロバイダセクション (openai:, anthropic: 等) の値を上書きする.
  # 下の例では separate_langchain=true なので, この model は使われない.
  # model: gpt-4o
  sleep_time: 0
  # trueにするとリクエスト種別ごとにLangChainとllm_message_historyを分離する.
  # 共通系 (initialize, daily_initialize, daily_finish) は両方に送信する.
  # 発話系 (talk, whisper) は llm.talk のモデルに送信する.
  # アクション系 (vote, divine, guard, attack) は llm.action のモデルに送信する.
  # falseにするとllm.typeの単一モデル/履歴で従来通り動作する.
  separate_langchain: true
  # talk / action には type の他に model / temperature / pricing_mode / base_url を直接書ける.
  # 指定した項目は下の <provider>: セクションより優先される. 省略した項目は <provider>: から継承.
  # これにより "同じ会社の違うモデル" (openai + gpt-5 / openai + gpt-4o-mini など) を
  # talk と action に別々に当てられる. type を省略すると llm.type をデフォルトとして使う.
  talk:
    type: anthropic
    model: claude-opus-4-5
  action:
    type: openai
    model: gpt-5.2
  # llm.thread: スレッド機能 (Step A 判断 + inference=llm 時の thread 割当) で使う第3系統.
  # 常に stateless (履歴なし) で動作し, separate_langchain の値には依存しない.
  # 軽量モデルを当てるとコスト・レイテンシを抑えられる.
  # thread.enabled=false のときは読まれない. type を省略すると llm.type をデフォルトとして使う.
  thread:
    type: openai
    model: gpt-5.2

openai:
  model: gpt-4o-mini
  temperature: 0.7

google:
  model: gemini-2.0-flash-lite
  temperature: 0.7

vertexai:
  model: gemini-2.0-flash-lite
  temperature: 0.7

ollama:
  model: llama3.1
  temperature: 0.7
  base_url: http://localhost:11434

anthropic:
  model: claude-opus-4-5-20251101
  temperature: 1.0

# スレッド機能 (talk 履歴を自動でスレッド化し, より整理された形で LLM に渡す).
# - enabled: false なら従来挙動 (フラットな history) のまま.
# - inference: heuristic (LLM 不使用, 決定論) | llm (P5 で追加, llm.thread で推定).
# - history_days: null なら全 day 保持表示, 整数 N なら直近 N 日のみプロンプトに渡す.
# 構造ログ (log/<game>/thread_structure/<agent>.jsonl) は log.file_output と
# thread.enabled の両方が true のときに自動出力される.
thread:
  enabled: true
  inference: llm
  history_days: null

# multi-turn モードでは LLM の会話履歴 (llm_message_history) が LangChain 側で保持されるため,
# 各リクエストのプロンプトは最低限のワンラインで足りる.
# ただし llm.separate_langchain=true の場合は talk系 / action系 LangChain が分離され履歴が共有されないため,
# 共通リクエスト (initialize / daily_initialize / daily_finish) のプロンプトで identity / event ブロックを
# include し, 両系統に最低限の情報共有を行う.
prompt:
  initialize: |-
    {{ block('identity') }}
    {{ block('instruction') }}
  daily_initialize: |-
    {{ block('instruction') }}
    {{ block('rules') }}
    {{ block('event') }}
    {{ block('daily_objective') }}
  daily_finish: |-
    {{ block('instruction') }}
    {{ block('event') }}
    {% set history_source = talk_history -%}
    {% set history_start = sent_talk_count -%}
    {{ block('history') }}
  talk: |-
    {{ block('game_state') }}
    {% if thread_enabled -%}
    {{ block('thread_summary') }}
    {{ block('thread_diff') }}
    {{ block('thread_context') }}
    {%- else -%}
    {% set history_source = talk_history -%}
    {% set history_start = sent_talk_count -%}
    {{ block('history') }}
    {%- endif %}
    {{ block('instruction') }}
    {{ block('constraints') }}
  whisper: |-
    {{ block('game_state') }}
    {% set history_source = whisper_history -%}
    {% set history_start = sent_whisper_count -%}
    {{ block('history') }}
    {{ block('instruction') }}
    {{ block('constraints') }}
  divine: |-
    {{ block('instruction') }}
    対象:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' %}{{ k }}
    {% endif -%}
    {%- endfor %}
    {{ block('constraints') }}
  guard: |-
    {{ block('instruction') }}
    対象:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' %}{{ k }}
    {% endif -%}
    {%- endfor %}
    {{ block('constraints') }}
  vote: |-
    {{ block('instruction') }}
    対象:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' %}{{ k }}
    {% endif -%}
    {%- endfor %}
    {{ block('constraints') }}
  attack: |-
    {{ block('instruction') }}
    対象:
    {% for k, v in info.status_map.items() -%}
    {%- if v == 'ALIVE' %}{{ k }}
    {% endif -%}
    {%- endfor %}
    {{ block('constraints') }}
