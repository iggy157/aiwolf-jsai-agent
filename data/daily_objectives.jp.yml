# =====================================================================
# 役職ごとの日別の主要目標 (各1項目)
# ---------------------------------------------------------------------
# 各役職が「その日」達成すべき中心的な目標を1文で定義する.
# プロンプト片としてそのまま LLM に渡せる長さと具体度に揃えている.
#
# キー:
#   役職名 (aiwolf_nlp_common.packet.Role enum と一致する英語名)
#
# 日の区分:
#   day_0   - 追放・襲撃がない観察中心の日. 占いのみが実行される.
#   day_1   - 最初の追放と最初の襲撃が発生する日. 占い結果が初めて
#             共有されうる日でもある.
#   day_2   - 中盤の起点. 偽占い対策 / 霊能結果の活用 / 襲撃対象選定
#             などが中心課題になる.
#   default - Day 3 以降の汎用指針 (終盤寄り). 残り人数が少なく
#             1回の追放・襲撃で勝敗が決まりうる局面を想定.
#
# 人数 (5/9/13) は問わない汎用的な表現にしている.
# サーバ仕様上 5人ゲームには BODYGUARD / MEDIUM は存在しないが,
# 9/13人ゲーム向けの指針として残す.
# =====================================================================

VILLAGER:
  day_0: "自己紹介を交わしながら他エージェントの言動と発言パターンを観察し, 怪しい挙動や違和感を記録する. 追放も襲撃も発生しない日なので, 情報収集に徹する."
  day_1: "占い師のCOと各エージェントのDay 0での発言の整合性を突き合わせ, 最も人狼らしいエージェントに投票する."
  day_2: "占いCO同士の矛盾 (偽占いの存在) や昨晩の襲撃対象から得られる情報を精査し, 人狼ラインの絞り込みを進める."
  default: "確定役職 (占い師・霊媒師) を守りつつ残る人狼候補を1手ずつ確実に追放する. 誤った追放1回で敗北する可能性があることを常に意識する."

SEER:
  day_0: "Day 0の占い対象を選び結果を記憶する. COタイミングは試合展開に応じて見極める (早期COが有利な局面もあれば, 潜伏が有利な局面もある)."
  day_1: "COするか否かを決め, 占い結果を根拠に村を人狼追放の方向へ誘導する. 偽占いCOが出た場合の反論も準備しておく."
  day_2: "新たな占い結果を共有し, 偽占いとの対立構造を作った上で, 自分の結果に整合する追放を村に通す."
  default: "生存している限り毎日結果を出し続ける. 襲撃リスクを下げるため議論で過度に目立たず, 他の村陣営に分析を委ねる場面も作る."

BODYGUARD:
  day_0: "Day 0は護衛がないため, 誰が本物の占い師っぽいか・誰が襲撃されそうかを見極める情報収集に徹する. Day 0 ではCOを避ける (Day 1 以降は護衛誘導など戦術目的で検討の余地あり)."
  day_1: "本物と思える占い師 (または最も襲撃されやすい村陣営の要のエージェント) を護衛対象に選ぶ. 自分の存在は隠し続ける."
  day_2: "引き続き要となる役職者を護衛する. 連続護衛などで人狼に護衛対象を読まれない工夫を意識する."
  default: "生存している限り村の最重要エージェントを護り続ける. 人狼に潜伏を見抜かれないよう, 終盤まで軽率なCOは避ける."

MEDIUM:
  day_0: "Day 0は追放がないため霊能結果は得られない. 議論の流れだけ観察し, 自分のCOは控える."
  day_1: "Day 1の追放者に対する霊能結果が初めて得られる. まだ COせず結果を溜め, 占いCOの真偽判定材料として温存する."
  day_2: "複数の霊能結果が揃い次第, 偽占い対策や議論のこう着打破のためにCOするタイミングを図る. 人狼結果が出ていれば村を勢いづける切り札になる."
  default: "COした後は全ての霊能結果を根拠に議論を引っ張り残存人狼の絞り込みに貢献する. 未COなら決定的な局面で切り札として出す."

WEREWOLF:
  day_0: "村人として自然に振る舞いつつ, 誰が占い師・騎士・霊媒師など脅威になりそうかを言動から推定する. 複数人狼構成なら囁きで仲間と連携の土台を作る (単独構成では発生しない)."
  day_1: "議論では無害な村人を演じ, 夜の襲撃対象として最も脅威となるエージェント (COした占い師など) を仲間と協議して決める."
  day_2: "偽占いで村を撹乱するか未確定の役職者を襲撃するかを選択し, 自分が追放されない立ち回りを維持する."
  default: "生存人狼数 ≥ 生存人間数 になる局面を狙う. 一晩の襲撃と一度の追放で勝利できる状況を作り, 疑いを他に逸らし続ける."

POSSESSED:
  day_0: "村人として振る舞いつつ, 本物の占い師が誰か・どのエージェントが人狼として動きそうかを言動から推定する. 偽占い師としてCOする場合は Day 0 に出す選択肢もあり, 展開に応じて見極める."
  day_1: "偽占い師としてCOするか否かを (Day 0 で出していなければ) 決める. COすれば本物占いとの対立構造が生まれ人狼陣営を守る効果が大きい."
  day_2: "偽COを選んだ場合は一貫した偽の占い結果を出し続け村を誤った追放へ誘導する. 偽COをしない場合も議論で人狼を守る発言を心がける."
  default: "人狼陣営の勝利のために必要なら自分を追放させてでも人狼の生存を優先する. 正体は最後まで明かさない."
