# =====================================================================
# ゲームルール: 日別のフェーズ進行 + 人数別役職編成
# ---------------------------------------------------------------------
# 本ファイルは LLM 向けに "何日目の朝/夜に何が起きているか" を明示し,
# 占い結果や霊能結果が まだ発生していない日に それらを参照/要求する
# 誤動作を防ぐ目的で作成されている.
#
# 日区分の根拠 (aiwolf-nlp-server/doc/ja/logic.md):
#   Day 0 夜: 占いフェーズのみ (追放・護衛・襲撃なし)
#   Day 1 夜: 追放 → 占い → 囁き → 護衛 → 襲撃 (初めての追放/襲撃)
#   Day 2 以降夜: 同上
#
# 結果がいつ初めて発生するか:
#   占い結果:   Day 0 夜 → Day 1 朝に使える
#   追放結果:   Day 1 夜 → Day 2 朝に使える
#   霊能結果:   Day 1 夜の追放者対象 → Day 2 朝に使える
#   襲撃結果:   Day 1 夜 → Day 2 朝に使える
# つまり Day 2 朝から情報が一気に出揃う.
# =====================================================================

# 日別のフェーズ進行ルール. morning は議論開始時の状況, night はその日の夜に
# 実施されるフェーズを示す.
daily:
  day_0:
    morning: "ゲーム初日の昼. 占い結果・霊能結果・追放結果・襲撃結果は いずれもまだ存在しない."
    night: "0日目の夜は占いフェーズのみ実施. 追放・護衛・襲撃は発生しない."
  day_1:
    morning: "占い師のみが Day 0 夜の占い結果 1件を持つ. 霊能結果・追放結果・襲撃結果は まだ存在しない (0日目に追放・襲撃がなかったため)."
    night: "Day 1 夜から 追放 → 占い → 囁き → 護衛 → 襲撃 の順に全フェーズが実施される. 初めての追放と襲撃が行われる夜."
  day_2:
    morning: "占い師は複数日分の占い結果を持つ. 霊媒師は初めての霊能結果 (Day 1 夜の追放者の種族) を持つ. 昨夜の襲撃結果 (Day 1 夜の襲撃対象) も初めて共有される."
    night: "追放 → 占い → 囁き → 護衛 → 襲撃 の順で実施. 以降の夜もこの順で進行する."
  default:
    morning: "占い結果・霊能結果が累積している. 昨夜の追放結果と襲撃結果が新たに共有される."
    night: "追放 → 占い → 囁き → 護衛 → 襲撃 の順で実施."

# 人数別の役職編成 (aiwolf-nlp-server/doc/ja/logic.md の表と一致).
# 市民陣営: VILLAGER / SEER / BODYGUARD / MEDIUM
# 人狼陣営: WEREWOLF / POSSESSED (狂人は種族 HUMAN だが人狼陣営として扱われる)
compositions:
  5:
    WEREWOLF: 1
    POSSESSED: 1
    SEER: 1
    VILLAGER: 2
  9:
    WEREWOLF: 2
    POSSESSED: 1
    SEER: 1
    BODYGUARD: 1
    MEDIUM: 1
    VILLAGER: 3
  13:
    WEREWOLF: 3
    POSSESSED: 1
    SEER: 1
    BODYGUARD: 1
    MEDIUM: 1
    VILLAGER: 6

# 役職編成を表示するときに英語 enum 名 → 日本語名に変換するためのラベル表.
role_labels:
  WEREWOLF: 人狼
  POSSESSED: 狂人
  SEER: 占い師
  BODYGUARD: 騎士
  MEDIUM: 霊媒師
  VILLAGER: 村人
