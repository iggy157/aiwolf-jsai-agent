# 日本語見出しラベル.
# prompts/jp/<name>.jinja の <name> に対応する日本語の見出し文字列を定義する.
# 未定義のブロックはファイル名 (stem) がそのまま見出しに使われる.
# 新しいブロックを追加するときは, 必要なら1行足すだけでよい.

history: 履歴
instruction: 指示
identity: 話者情報
event: イベント
constraints: 出力制約
daily_objective: 本日の目標
game_state: ゲーム状況
rules: ルール
thread_summary: スレッド一覧
thread_history: スレッド別履歴
thread_diff: 新着発話 (前回送信以降)
thread_decision: 判断指示 (Step A)
thread_context: 判断結果
thread_assign: スレッド割当推定
